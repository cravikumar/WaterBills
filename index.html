</thead>

</table>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const ALL_FLATS = [
101,102,103,104,105,106,107,108,109,110,111,112,113,114,
201,202,203,204,205,206,207,208,209,210,211,212,213,214,
301,302,303,304,305,306,307,308,309,310,311,312,313,314,
401,402,403,404,405,406,407,408,409,410,411,412,413,414,
501,502,503,504,505,506,507,508,509,510,511,512,513,514
];

async function extractTokens(file){
const data = new Uint8Array(await file.arrayBuffer());
const pdf = await pdfjsLib.getDocument({data}).promise;

let tokens=[];
for(let p=1;p<=pdf.numPages;p++){
const page=await pdf.getPage(p);
const txt=await page.getTextContent();
txt.items.forEach(i=>tokens.push(i.str.trim()));
}
return tokens.filter(t=>t);
}

function parseBills(tokens){
const bills={};

for(let i=0;i<tokens.length;i++){
const flat=parseInt(tokens[i]);

if(ALL_FLATS.includes(flat)){
let amount=null;

for(let j=i+1;j<i+15 && j<tokens.length;j++){

if(/^\d+\.\d{2}$/.test(tokens[j])){
const val=parseFloat(tokens[j]);

// Ignore footer totals
if(val>0 && val<2000){
amount=val;
}
}

if(ALL_FLATS.includes(parseInt(tokens[j]))) break;
}

if(amount!==null){
bills[flat]=amount;
}
}
}

console.log("Bills parsed:", bills);
return bills;
}

function parseBank(tokens){
const txns=[];

for(let i=0;i<tokens.length-1;i++){
if(
/^\d{1,3}(,\d{3})*\.\d{2}$/.test(tokens[i]) &&
/^\d{1,3}(,\d{3})*\.\d{2}$/.test(tokens[i+1])
){
const amount=parseFloat(tokens[i].replace(/,/g,""));
