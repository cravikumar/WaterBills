<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Water Bill Reconciler</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h2 { margin-top: 30px; }
    table { border-collapse: collapse; width: 100%; margin-top: 10px; }
    th, td { border: 1px solid #ccc; padding: 6px; text-align: left; }
    th { background: #f0f0f0; }
    .paid { background: #d4edda; }
    .unpaid { background: #f8d7da; }
    button { padding: 4px 8px; }
  </style>
</head>
<body>
  <h1>Water Bill Reconciliation</h1><label>Bills PDF: <input type="file" id="billsFile" accept="application/pdf" /></label><br/><br/> <label>Bank PDF: <input type="file" id="bankFile" accept="application/pdf" /></label><br/><br/>

<button onclick="reconcile()">Reconcile Data</button>

  <h2>Bill vs Payment</h2>
  <table id="billTable">
    <thead>
      <tr><th>Flat</th><th>Bill</th><th>Paid</th><th>Status</th><th>Override</th></tr>
    </thead>
    <tbody></tbody>
  </table>  <h2>Unmatched Bank Transactions</h2>
  <table id="unmatchedTable">
    <thead>
      <tr><th>Date</th><th>Amount</th><th>Description</th></tr>
    </thead>
    <tbody></tbody>
  </table><script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

async function extractText(file) {
  const data = new Uint8Array(await file.arrayBuffer());
  const pdf = await pdfjsLib.getDocument({data}).promise;
  let tokens = [];
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    content.items.forEach(item => tokens.push(item.str.trim()));
  }
  return tokens.filter(t => t);
}

function parseBills(tokens) {
  const bills = {};
  for (let i = 0; i < tokens.length - 1; i++) {
    const flat = tokens[i];
    const amount = tokens[i + 1];
    if (/^[1-5]0[1-4]$/.test(flat) && /^\d+\.\d{2}$/.test(amount)) {
      bills[flat] = parseFloat(amount);
    }
  }
  return bills;
}

function parseBank(tokens) {
  const txns = [];
  for (let i = 0; i < tokens.length - 2; i++) {
    const amt = tokens[i];
    const bal = tokens[i + 1];
    if (/^\d{1,3}(,\d{3})*\.\d{2}$/.test(amt) && /^\d{1,3}(,\d{3})*\.\d{2}$/.test(bal)) {
      const amount = parseFloat(amt.replace(/,/g, ''));
      let desc = [];
      let j = i - 1;
      while (j >= 0 && !/^\d{1,2}$/.test(tokens[j])) {
        desc.unshift(tokens[j]);
        j--;
      }
      txns.push({ amount, description: desc.join(' ') });
    }
  }
  return txns;
}

async function reconcile() {
  const billsFile = document.getElementById('billsFile').files[0];
  const bankFile = document.getElementById('bankFile').files[0];
  if (!billsFile || !bankFile) {
    alert('Upload both PDFs');
    return;
  }

  const billTokens = await extractText(billsFile);
  const bankTokens = await extractText(bankFile);

  const bills = parseBills(billTokens);
  const txns = parseBank(bankTokens);

  const billBody = document.querySelector('#billTable tbody');
  const unmatchedBody = document.querySelector('#unmatchedTable tbody');
  billBody.innerHTML = '';
  unmatchedBody.innerHTML = '';

  const used = new Set();

  Object.entries(bills).sort().forEach(([flat, amt]) => {
    let paid = txns.find((t, idx) => !used.has(idx) && t.amount === amt);
    const row = document.createElement('tr');
    if (paid) {
      const idx = txns.indexOf(paid);
      used.add(idx);
      row.className = 'paid';
      row.innerHTML = `<td>${flat}</td><td>${amt}</td><td>${paid.amount}</td><td>Paid</td><td><button onclick="this.closest('tr').className='paid'">Override</button></td>`;
    } else {
      row.className = 'unpaid';
      row.innerHTML = `<td>${flat}</td><td>${amt}</td><td>-</td><td>Unpaid</td><td><button onclick="this.closest('tr').className='paid'">Override</button></td>`;
    }
    billBody.appendChild(row);
  });

  txns.forEach((t, idx) => {
    if (!used.has(idx)) {
      const row = document.createElement('tr');
      row.innerHTML = `<td>-</td><td>${t.amount}</td><td>${t.description}</td>`;
      unmatchedBody.appendChild(row);
    }
  });
}
</script></body>
</html>
