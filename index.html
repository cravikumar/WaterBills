<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Water Bill Reconciler</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body { font-family: Arial; margin:20px; }
table { border-collapse: collapse; width:100%; margin-top:10px; }
th,td { border:1px solid #ccc; padding:6px; }
th { background:#eee; }
.paid { background:#d4edda; }
.unpaid { background:#f8d7da; }
.nobill { background:#fff3cd; }
</style>
</head>

<body>

<h2>Water Bill Reconciliation</h2>

<label>Bills PDF:
<input type="file" id="billsFile" accept="application/pdf">
</label><br><br>

<label>Bank PDF:
<input type="file" id="bankFile" accept="application/pdf">
</label><br><br>

<button id="reconcileBtn">Reconcile Data</button>

<h3>Bill vs Payment</h3>
<table id="billTable">
<thead>
<tr>
<th>Flat</th>
<th>Bill</th>
<th>Paid</th>
<th>Status</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h3>Unmatched Bank Transactions</h3>
<table id="unmatchedTable">
<thead>
<tr>
<th>Amount</th>
<th>Description</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const ALL_FLATS = [
101,102,103,104,105,106,107,108,109,110,111,112,113,114,
201,202,203,204,205,206,207,208,209,210,211,212,213,214,
301,302,303,304,305,306,307,308,309,310,311,312,313,314,
401,402,403,404,405,406,407,408,409,410,411,412,413,414,
501,502,503,504,505,506,507,508,509,510,511,512,513,514
];

document.getElementById("reconcileBtn").addEventListener("click", reconcile);

async function extractTokens(file){
try {
const data = new Uint8Array(await file.arrayBuffer());
const pdf = await pdfjsLib.getDocument({data}).promise;

let tokens=[];
for(let p=1;p<=pdf.numPages;p++){
const page=await pdf.getPage(p);
const txt=await page.getTextContent();
txt.items.forEach(i=>tokens.push(i.str.trim()));
}

return tokens.filter(t=>t);
} catch(e){
alert("Error reading PDF: " + e.message);
throw e;
}
}

function parseBills(tokens){
const bills={};

for(let i=0;i<tokens.length;i++){
const flat=parseInt(tokens[i]);

if(ALL_FLATS.includes(flat)){
let amount=null;

for(let j=i+1;j<i+15 && j<tokens.length;j++){

if(/^\d+\.\d{2}$/.test(tokens[j])){
const val=parseFloat(tokens[j]);

if(val>0 && val<2000){
amount=val;
}
}

if(ALL_FLATS.includes(parseInt(tokens[j]))) break;
}

if(amount!==null){
bills[flat]=amount;
}
}
}
return bills;
}

function parseBank(tokens){
const txns=[];

for(let i=0;i<tokens.length-1;i++){
if(
/^\d{1,3}(,\d{3})*\.\d{2}$/.test(tokens[i]) &&
/^\d{1,3}(,\d{3})*\.\d{2}$/.test(tokens[i+1])
){
const amount=parseFloat(tokens[i].replace(/,/g,""));

let desc=[];
let j=i-1;
while(j>=0 && !/^\d{1,2}$/.test(tokens[j])){
desc.unshift(tokens[j]);
j--;
}

txns.push({
amount:amount,
description:desc.join(" ")
});
}
}
return txns;
}

async function reconcile(){
try {

const billFile=document.getElementById("billsFile").files[0];
const bankFile=document.getElementById("bankFile").files[0];

if(!billFile || !bankFile){
alert("Please upload both PDFs first.");
return;
}

const billTokens=await extractTokens(billFile);
const bankTokens=await extractTokens(bankFile);

const bills=parseBills(billTokens);
const txns=parseBank(bankTokens);

const billBody=document.querySelector("#billTable tbody");
const unmatchedBody=document.querySelector("#unmatchedTable tbody");

billBody.innerHTML="";
unmatchedBody.innerHTML="";

const used=new Set();

ALL_FLATS.forEach(flat=>{

const bill=bills[flat] || 0;
let payment=null;

if(bill>0){
payment=txns.find((t,idx)=>{
if(used.has(idx)) return false;
if(t.amount===bill){
used.add(idx);
return true;
}
return false;
});
}

const tr=document.createElement("tr");

if(payment) tr.className="paid";
else if(bill===0) tr.className="nobill";
else tr.className="unpaid";

tr.innerHTML=`
<td>${flat}</td>
<td>${bill.toFixed(2)}</td>
<td>${payment?payment.amount.toFixed(2):"-"}</td>
<td>${payment?"Paid":(bill===0?"No Bill":"Unpaid")}</td>
`;

billBody.appendChild(tr);
});

txns.forEach((t,idx)=>{
if(!used.has(idx)){
const tr=document.createElement("tr");
tr.innerHTML=`
<td>${t.amount.toFixed(2)}</td>
<td>${t.description}</td>
`;
unmatchedBody.appendChild(tr);
}
});

alert("Reconciliation completed");

} catch(e){
alert("Reconciliation failed: " + e.message);
console.error(e);
}
}
</script>

</body>
</html>
